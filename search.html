<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            background-color: #ffc800;
            margin: 0;
            padding: 0;
        }
        h1 {
            background-color: #ffe897;
            padding: 16px;
            border-radius: 10px;
        }
        .search-container {
            position: relative;
            margin-top: 30px;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
        }
        .search-results li {
            padding: 10px;
            cursor: pointer;
        }
        .search-results li:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Kết quả tìm kiếm</h1>
        <div class="search-container">
            <form class="d-flex" action="./search.html" method="get">
                <input style="font-size: 18px;" id="searchInput" class="form-control me-2" type="text" placeholder="Tìm bài học..." name="query" autocomplete="off">
                <button style="border: none; background-color: #282424; font-size: 18px; color: white;" class="btn btn-outline-light" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
            <ul id="suggestions" class="search-results list-group d-none"></ul>
        </div>
    </div>

    <script>
        // Danh sách bài học
        const htmlFiles = [
            { path: "/tin/tin.html", name: "Môn Tin" },
            { path: "/tin/tin6-bai1.html", name: "Tin 6 - Bài 1" },
            { path: "/toan/toan.html", name: "Môn Toán" },
            { path: "/toan/toan6-bai1.html", name: "Toán 6 - Bài 1" },
            { path: "/toan/toan7-bai2.html", name: "Toán 7 - Bài 2" }
        ];

        // Lấy phần tử DOM
        const searchInput = document.getElementById('searchInput');
        const suggestions = document.getElementById('suggestions');

        // Lắng nghe sự kiện khi nhập từ khóa
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            suggestions.innerHTML = ''; // Xóa gợi ý cũ
            if (query.length > 0) {
                // Lọc kết quả phù hợp
                const results = htmlFiles.filter(file => file.name.toLowerCase().includes(query));
                if (results.length > 0) {
                    results.forEach(file => {
                        const listItem = document.createElement('li');
                        listItem.className = 'list-group-item';
                        listItem.textContent = file.name;
                        listItem.onclick = () => {
                            window.location.href = file.path; // Chuyển hướng khi nhấp
                        };
                        suggestions.appendChild(listItem);
                    });
                    suggestions.classList.remove('d-none'); // Hiển thị gợi ý
                } else {
                    suggestions.innerHTML = '<li class="list-group-item">Không tìm thấy kết quả phù hợp.</li>';
                    suggestions.classList.remove('d-none');
                }
            } else {
                suggestions.classList.add('d-none'); // Ẩn gợi ý nếu không có từ khóa
            }
        });

        // Ẩn danh sách gợi ý khi nhấn ra ngoài
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                suggestions.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
