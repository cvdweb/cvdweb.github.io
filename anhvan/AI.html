<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo Sư Lộc</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chatbox {
            background-color: white;
            width: 300px;
            height: 400px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .messages {
            overflow-y: scroll;
            flex-grow: 1;
            padding: 10px;
            height: 80%;
        }
        .message {
            margin: 5px;
            padding: 10px;
            border-radius: 10px;
        }
        .user-message {
            background-color: #f1f1f1;
            text-align: right;
        }
        .ai-message {
            background-color: #e0e0e0;
            text-align: left;
        }
        .input-area {
            display: flex;
        }
        .input-area input {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .input-area button {
            width: 20%;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
        .input-area button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="chatbox">
        <div class="messages" id="messages">
            <!-- Messages will appear here -->
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Thêm API Key của bạn tại đây
        const apiKey = "YOUR_API_KEY_HERE"; // Thay bằng API Key thật của bạn

        // Hàm gửi tin nhắn
        async function sendMessage() {
            const userMessage = document.getElementById('userInput').value;
            if (userMessage.trim() === "") return;

            // Hiển thị tin nhắn người dùng
            const messagesDiv = document.getElementById('messages');
            const userMessageDiv = document.createElement('div');
            userMessageDiv.classList.add('message', 'user-message');
            userMessageDiv.textContent = userMessage;
            messagesDiv.appendChild(userMessageDiv);

            // Xóa trường nhập liệu
            document.getElementById('userInput').value = "";

            // Gửi tin nhắn đến GPT-3/4
            const aiResponse = await getAIResponse(userMessage);

            // Hiển thị phản hồi từ AI
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.classList.add('message', 'ai-message');
            aiMessageDiv.textContent = aiResponse;
            messagesDiv.appendChild(aiMessageDiv);

            // Cuộn xuống dưới cùng để xem tin nhắn mới
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Hàm gọi OpenAI API để trả lời
        async function getAIResponse(userMessage) {
            const apiUrl = "https://api.openai.com/v1/chat/completions";

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo", // Hoặc "gpt-4" nếu bạn muốn dùng GPT-4
                        messages: [{ role: "user", content: userMessage }],
                        max_tokens: 150
                    })
                });

                const data = await response.json();

                // Kiểm tra nếu API phản hồi lỗi
                if (response.ok) {
                    return data.choices[0].message.content;
                } else {
                    console.error("Error from API:", data);
                    return `Error: ${data.error.message || "Unknown error occurred"}`;
                }
            } catch (error) {
                console.error("Error connecting to OpenAI API:", error);
                return "There was an error connecting to the server. Please try again.";
            }
        }
    </script>
</body>
</html>
